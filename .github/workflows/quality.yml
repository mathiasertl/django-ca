name: Code quality
on:
  push:
  pull_request:

env:
  UV_PYTHON_PREFERENCE: only-system
  UV_NO_SYNC: 1

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DJANGO_CA_SECRET_KEY: dummy
    steps:

      - name: Acquire sources
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra api --no-default-groups --group dev --group lint

      - name: Run ruff
        run: uv run python dev.py code-quality

      # Will show outdated dependencies, etc
      - name: Validate state
        run: uv run python dev.py validate state

      - name: Check license headers
        run: uv run python dev.py validate license-headers

      - name: Validate sdist/wheel
        run: |
            uv build

      - name: Run pylint
        run: uv run pylint ca/django_ca/ ca/ca/ docs/source/django_ca_sphinx/ devscripts/
