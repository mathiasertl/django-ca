configuration:
  context:
    apt_install: "{{ apt }} install{% if run %} -y{% endif %}"
    uv: uv
    base_box: ubuntu/jammy64
    hostname: ca.example.com
    DHPARAM_BITS: "4096"
    DB_PASSWORD: ...
    DJANGO_CA_CA_URL_PATH: ""
    PROFILE_PATH: ~/.profile
    SECRET_KEY_COMMAND: openssl rand -base64 32
    # Directories:
    BASE_DIR: /opt/django-ca
    ETC_DIR: /etc/django-ca
    HOME_DIR: "{{ BASE_DIR }}/home"
    PYTHON_INSTALL_DIR: "{{ BASE_DIR }}/python"
    SRC_BASE_DIR: "{{ BASE_DIR }}/src"
    SRC_DIR: "{{ SRC_BASE_DIR }}/django-ca"
  doc:
    context:
      apt: apt
      user: root
      SECRET_KEY: ...
    alternatives:
      mariadb:
        name: MariaDB
      postgres:
        name: PostgreSQL
      redis-broker:
        name: Redis
      redis-cache:
        name: Redis
      memcached:
        name: Memcached
      rabbitmq:
        name: RabbitMQ
      download_source:
        name: Download source tarball
      clone_source:
        name: Clone source from Git
  run:
    context:
      apt: apt-get
      DHPARAM_BITS: "2048"  # a little faster
      DJANGO_CA_VERSION: main
    runner:
      path: structured_tutorials.runners.vagrant.VagrantRunner
      options:
        prepare_box:
          path: box
          name: django-ca-from-source
parts:
  - id: apt-update
    name: Install required packages...
    commands:
      - command: "{{ apt }} update"
      - command: "{{ apt }} dist-upgrade{% if run %} -y{% endif %}"
      - command: "{{ apt_install }} python3 curl"
  - id: install-db
    name: Install database
    alternatives:
      postgres:
        commands:
          - command: "{{ apt_install }} build-essential postgresql postgresql-client libpq-dev"
      mariadb:
        commands:
          - command: "{{ apt_install }} build-essential pkg-config mariadb-server mariadb-client libmariadb-dev"
  - id: install-cache
    name: Install distributed cache...
    alternatives:
      redis-cache:
        commands:
          - command: "{{ apt_install }} redis-server"
      memcached:
        commands:
          - command: "{{ apt_install }} memcached"
  - id: install-broker
    name: Install a message broker...
    alternatives:
      redis-broker:
        commands:
          - command: "{{ apt_install }} redis-server"
      rabbitmq:
        commands:
          - command: "{{ apt_install }} rabbitmq-server"
  - id: install-uv
    name: Install uv...
    commands:
      - command: "curl -LsSf https://astral.sh/uv/install.sh | sh"
        doc:
          output: "downloading uv ..."
  - id: install-uv-python
    name: Install Python using uv...
    commands:
      - command: export UV_PYTHON_INSTALL_DIR={{ PYTHON_INSTALL_DIR }}
      - command: echo "export UV_PYTHON_INSTALL_DIR={{ PYTHON_INSTALL_DIR }}" | tee -a {{ PROFILE_PATH }}
      - command: "{{ uv }} python install"
  - id: set-hostname
    commands:
      - command: |
          {%- if run -%}
            echo "export HOSTNAME={{ hostname }}" | tee -a {{ PROFILE_PATH }}
          {%- else -%}
            export HOSTNAME={{ hostname }}
          {%- endif -%}
  - id: prepare-host
    commands:
      - command: "adduser --system --group --disabled-login --home={{ HOME_DIR }} django-ca"
        doc:
          output: Adding system user `django-ca' ...
      - command: "mkdir -p {{ SRC_DIR }} {{ ETC_DIR }} {{ HOME_DIR }}/files"
      - command: chown django-ca:django-ca {{ HOME_DIR }}/files
      - command: chmod go-rwx {{ HOME_DIR }}/files
  - id: setup-database
    name: Setup database...
    alternatives:
      postgres:
        commands:
          - command: openssl rand -base64 32
            doc:
              output: "..."
            run:
              test:
                - regex: "(?P<DB_PASSWORD>.*)"
          - command: sudo -u postgres psql
            doc:
              output: |
                postgres=# CREATE DATABASE django_ca;
                CREATE DATABASE
                postgres=# CREATE USER django_ca WITH ENCRYPTED PASSWORD '...';
                CREATE ROLE
                postgres=# GRANT ALL PRIVILEGES ON DATABASE django_ca TO django_ca;
                GRANT
            run:
              stdin:
                contents: |
                  CREATE DATABASE django_ca;
                  CREATE USER django_ca WITH ENCRYPTED PASSWORD '{{ DB_PASSWORD }}';
                  GRANT ALL PRIVILEGES ON DATABASE django_ca TO django_ca;
      mariadb:
        commands:
          - command: openssl rand -base64 32
            doc:
              output: "..."
            run:
              test:
                - regex: "(?P<DB_PASSWORD>.*)"
          - command: mariadb
            doc:
              output: |
                ....
                MariaDB [(none)]> CREATE DATABASE django_ca CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
                Query OK, 1 row affected (0.000 sec)

                MariaDB [(none)]> CREATE USER 'django_ca'@'localhost' IDENTIFIED BY '...';
                Query OK, 0 rows affected (0.001 sec)

                MariaDB [(none)]>
                MariaDB [(none)]> GRANT ALL PRIVILEGES ON django_ca.* TO 'django_ca'@'localhost';
                Query OK, 0 rows affected (0.001 sec)

                MariaDB [(none)]> FLUSH PRIVILEGES;
                Query OK, 0 rows affected (0.000 sec)
            run:
              stdin:
                contents: |
                  CREATE DATABASE django_ca CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
                  CREATE USER 'django_ca'@'localhost' IDENTIFIED BY '{{ DB_PASSWORD }}';
                  GRANT ALL PRIVILEGES ON django_ca.* TO 'django_ca'@'localhost';
                  FLUSH PRIVILEGES;
  - id: setup-broker
    name: Setup broker...
    alternatives:
      rabbitmq:
        commands:
          - command: python3 -c "import secrets, string; print(secrets.token_urlsafe(32))"
            doc:
              output: "..."
            run:
              test:
                - regex: "(?P<CACHE_PASSWORD>.*)"
          - command: rabbitmqctl delete_user guest
            doc:
              output: Deleting user "guest" ...
          - command: rabbitmqctl add_vhost django_ca
            doc:
              output: Adding vhost "django_ca" ...
          - command: rabbitmqctl add_user django_ca {{ CACHE_PASSWORD }}
            doc:
              output: Adding user "django_ca" ...
          - command: 'rabbitmqctl set_permissions -p django_ca django_ca ".*" ".*" ".*"'
            doc:
              output: Setting permissions for user "django_ca" in vhost "django_ca" ...
    required: false
  - id: install-source
    name: Install source code...
    alternatives:
      download_source:
        commands:
          - command: cd {{ SRC_BASE_DIR }}
            chdir: "{{ SRC_BASE_DIR }}"
          - command: |
              curl -Lo django-ca-{{ DJANGO_CA_VERSION }}.tar.gz {% if run and DJANGO_CA_VERSION == 'main' -%}
                https://github.com/mathiasertl/django-ca/archive/refs/heads/main.tar.gz
              {%- else -%}
                https://github.com/mathiasertl/django-ca/releases/download/{{ DJANGO_CA_VERSION }}/django_ca-{{ DJANGO_CA_VERSION }}.tar.gz
              {%- endif -%}
          - command: export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_django_ca={{ DJANGO_CA_VERSION }}
            run:
              update_environment:
                SETUPTOOLS_SCM_PRETEND_VERSION_FOR_django_ca: "{{ DJANGO_CA_VERSION }}"
          - command: "tar xf django-ca-{{ DJANGO_CA_VERSION }}.tar.gz"
          - command: "ln -s django-ca-{{ DJANGO_CA_VERSION }} django-ca"
      clone_source:
        commands:
          - command: "{{ apt }} install git"
          - command: cd {{ SRC_BASE_DIR }}
            chdir: "{{ SRC_BASE_DIR }}"
          - command: "git clone https://github.com/mathiasertl/django-ca.git -v {{ DJANGO_CA_VERSION }}"
      export_source:
        commands:
          - command: mkdir -p {{ SRC_DIR }}
          - command: |
              cd /vagrant && \
              uv run -q --no-project --isolated --with hatch hatch --no-color -q version 2> /dev/null | tail -n 1
            run:
              test:
                - regex: "^(?P<DJANGO_CA_VERSION>.*)$"
              update_environment:
                SETUPTOOLS_SCM_PRETEND_VERSION: "{{ DJANGO_CA_VERSION }}"
          - command: cd /vagrant && git archive HEAD | tar -x -C {{ SRC_DIR }}/
        doc: false
    chdir: "{{ SRC_BASE_DIR }}"
  - id: create-virtualenv
    name: Create virtual environment...
    alternatives:
      postgres:
        commands:
        - command: cd django-ca
          chdir: "{{ SRC_DIR }}"
        - command: "{{ uv }} sync -p `{{ uv }} python find` --no-default-groups --group gunicorn --all-extras --no-extra mysql"
      mariadb:
        commands:
        - command: cd django-ca
          chdir: "{{ SRC_DIR }}"
        - command: "{{ uv }} sync -p `{{ uv }} python find` --no-default-groups --group gunicorn --all-extras --no-extra postgres"
          chdir: ""
    chdir: "{{ SRC_DIR }}"
  - id: calculate-secret-key
    name: Generate secret key...
    commands:
      - command: "{{ SECRET_KEY_COMMAND }}"
        run:
          test:
            - regex: "(?P<SECRET_KEY>.*)"
    doc: false
  - id: add-systemd-services
    name: Add systemd services...
    commands:
      - command: ln -s {{ SRC_DIR }}/systemd/systemd.conf {{ ETC_DIR }}/
      - command: ln -s {{ SRC_DIR }}/systemd/*.socket /etc/systemd/system/
      - command: ln -s {{ SRC_DIR }}/systemd/*.service /etc/systemd/system/
      - command: systemctl daemon-reload
      - command: systemctl enable django-ca django-ca-celery django-ca-celerybeat
        doc:
          output: Created symlink ...
  - id: add-basic-settings
    name: Add basic settings...
    commands:
      - command: ln -s {{ SRC_DIR }}/conf/source/00-settings.yaml {{ ETC_DIR }}/
  - id: add-required-settings
    name: Add required settings...
    source: 10-localsettings.yaml
    destination: "{{ ETC_DIR }}/10-localsettings.yaml"
    doc:
      language: yaml
  - id: add-db-settings
    name: Add database settings...
    alternatives:
      postgres:
        source: 20-database-postgres.yaml
        destination: "{{ ETC_DIR }}/20-database.yaml"
        doc:
          language: yaml
      mariadb:
        source: 20-database-mariadb.yaml
        destination: "{{ ETC_DIR }}/20-database.yaml"
        doc:
          language: yaml
  - id: add-cache-settings
    name: Add cache settings...
    alternatives:
      redis-cache:
        source: 20-cache-redis.yaml
        destination: "{{ ETC_DIR }}/20-cache.yaml"
        doc:
          language: yaml
      memcached:
        source: 20-cache-memcached.yaml
        destination: "{{ ETC_DIR }}/20-cache.yaml"
        doc:
          language: yaml
  - id: add-broker-settings
    name: Add broker settings...
    alternatives:
      redis-broker:
        source: 30-broker-redis.yaml
        destination: "{{ ETC_DIR }}/30-broker.yaml"
        doc:
          language: yaml
      rabbitmq:
        source: 30-broker-rabbitmq.yaml
        destination: "{{ ETC_DIR }}/30-broker.yaml"
        doc:
          language: yaml
  - id: add-runtime-config
    name: Add runtime configuration...
    source: 99-runtime.yaml
    destination: "{{ ETC_DIR }}/99-runtime.yaml"
    doc: false
  - id: add-gunicorn-config
    name: Add Gunicorn configuration...
    commands:
      - command: ln -s {{ SRC_DIR }}/gunicorn/gunicorn.conf.py {{ ETC_DIR }}/
  - id: secure-configuration
    name: Make sure that configuration is not world-readable...
    commands:
      - command: chown -R root:django-ca {{ ETC_DIR }}
      - command: chmod -R u+rwX,g+rX,o-rwx {{ ETC_DIR }}
  - id: add-shortcut
    name: Add manage.py shortcut...
    commands:
      - command: ln -s {{ SRC_DIR }}/conf/source/manage /usr/local/bin/django-ca
      - command: chmod a+rx /usr/local/bin/django-ca
      - command: django-ca check
        doc:
          output: System check identified no issues (0 silenced).
        run:
          test:
            - regex: "0 silenced"
  - id: run-initial-manage-commands
    name: Run initial manage.py commands...
    commands:
      - command: django-ca migrate
        doc:
          output: |
            Operations to perform:
            ...
      - command: FORCE_USER=root django-ca collectstatic
        doc:
          output: "... static files copied to '{{ BASE_DIR }}/html/static'."
  - id: start
    name: Start systemd services...
    commands:
      - command: systemctl start django-ca django-ca-celery django-ca-celerybeat
        run:
          test:
            - command: systemctl is-active django-ca
              retry: 3  # first service might not be up immediately
              backoff_factor: 0.3
            - command: systemctl is-active django-ca-celery
            - command: systemctl is-active django-ca-celerybeat
  - id: create-user-and-ca
    name: Create user and initial CAs...
    commands:
      - command: |
          {%- if doc -%}
            django-ca createsuperuser
          {%- else -%}
            django-ca shell -v 0 -c "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.create_superuser('user', 'user@example.com', 'nopass')"
          {%- endif -%}
        doc:
          output: ...
      - command: django-ca init_ca --path-length=1 Root CN=Root
        doc:
          output: "<root serial>"
      - command: django-ca init_ca  --acme-enable --parent=Root Intermediate CN=Intermediate
        doc:
          output: "<child serial>"
  - id: install-nginx
    name: Install NGINX...
    commands:
      - command: "{{ apt_install }} nginx"
  - id: nginx-basic-setup
    name: "Remove basic NGINX configuration..."
    commands:
      - command: rm -f /etc/nginx/sites-enabled/default
  - id: create-tls-key
    name: "Create TLS key..."
    commands:
      - command: openssl genrsa -out /etc/ssl/$HOSTNAME.key 4096
      - command: openssl req -new -key /etc/ssl/$HOSTNAME.key -out /tmp/ca.csr -utf8 -batch
      - command: django-ca sign_cert --ca=Intermediate --csr=/tmp/ca.csr --bundle --webserver --subject CN=$HOSTNAME > /etc/ssl/$HOSTNAME.pem
  - id: create-dh-params
    name: "Create DH parameters"
    commands:
      - command: mkdir -p /etc/nginx/dhparams/
      - command: openssl dhparam -dsaparam -out /etc/nginx/dhparams/dhparam.pem {{ DHPARAM_BITS }}
        doc:
          output: |
            Generating DSA parameters, {{ DHPARAM_BITS }} bit long prime
            ...
  - id: create-nginx-config
    name: "Create NGINX configuration"
    commands:
      - command: envsubst < {{ SRC_DIR }}/nginx/source.template > /etc/nginx/sites-available/django-ca.conf
      - command: ln -fs /etc/nginx/sites-available/django-ca.conf /etc/nginx/sites-enabled/
      - command: nginx -t
        doc:
          output: |
            nginx: the configuration file /etc/nginx/nginx.conf syntax is ok
            nginx: configuration file /etc/nginx/nginx.conf test is successful
      - command: systemctl restart nginx

  - prompt: |
      Test admin interface at:

      * URL: https://localhost:8443/admin/
      * Credentials: user/nopass

      Working directory is {{ cwd }}
      Is the state okay? (Y/n)
    response: confirm